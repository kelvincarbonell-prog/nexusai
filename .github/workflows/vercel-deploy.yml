name: Vercel deploy (CLI con token)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Resolve scope of prj_ocdNYAYiJr2uXC3gUk0m16YDAMKO
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        id: find
        run: |
          set -euo pipefail
          TARGET="prj_ocdNYAYiJr2uXC3gUk0m16YDAMKO"
          ORG_ID=""

          TEAMS_JSON=$(curl -fsS -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v2/teams")

          # Itera por todos los teams del usuario
          for tid in $(echo "$TEAMS_JSON" | python3 -c "import sys,json;[print(t['id']) for t in json.load(sys.stdin).get('teams',[])]"); do
            HTTP=$(curl -s -o /tmp/proj.json -w '%{http_code}' -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v9/projects/$TARGET?teamId=$tid")
            if [ "$HTTP" = "200" ]; then
              NAME=$(python3 -c "import json;print(json.load(open('/tmp/proj.json'))['name'])")
              SLUG=$(python3 -c "import sys,json;[print(t['slug']) for t in json.load(sys.stdin).get('teams',[]) if t['id']=='$tid']" <<< "$TEAMS_JSON")
              echo "âś“ Encontrado en team $SLUG ($tid) â†’ project name=$NAME"
              ORG_ID="$tid"
              echo "org_id=$tid" >> $GITHUB_OUTPUT
              echo "team_slug=$SLUG" >> $GITHUB_OUTPUT
              echo "project_name=$NAME" >> $GITHUB_OUTPUT
              break
            fi
          done

          if [ -z "$ORG_ID" ]; then
            # Fallback: personal scope con userId
            USER_ID=$(curl -fsS -H "Authorization: Bearer $VERCEL_TOKEN" https://api.vercel.com/v2/user | python3 -c "import sys,json;print(json.load(sys.stdin)['user']['id'])")
            HTTP=$(curl -s -o /tmp/proj.json -w '%{http_code}' -H "Authorization: Bearer $VERCEL_TOKEN" "https://api.vercel.com/v9/projects/$TARGET")
            if [ "$HTTP" = "200" ]; then
              echo "âś“ Encontrado en personal scope ($USER_ID)"
              echo "org_id=$USER_ID" >> $GITHUB_OUTPUT
              echo "project_name=$(python3 -c "import json;print(json.load(open('/tmp/proj.json'))['name'])")" >> $GITHUB_OUTPUT
            else
              echo "::error::Project $TARGET no encontrado"
              exit 1
            fi
          fi

      - name: Vercel pull + build + deploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          ORG_ID="${{ steps.find.outputs.org_id }}"
          PROJ_ID="prj_ocdNYAYiJr2uXC3gUk0m16YDAMKO"

          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$ORG_ID" "$PROJ_ID" > .vercel/project.json
          cat .vercel/project.json
          echo

          echo "::group::vercel pull"
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          echo "::endgroup::"

          echo "::group::vercel build"
          vercel build --prod --token=$VERCEL_TOKEN
          echo "::endgroup::"

          echo "::group::vercel deploy"
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "::endgroup::"

          echo "đźš€ DEPLOY URL: $DEPLOY_URL"
          echo "::notice title=Deploy listo::$DEPLOY_URL"
          echo "## âś… Deploy listo" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "URL: <$DEPLOY_URL>" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${GITHUB_SHA::7}\`" >> $GITHUB_STEP_SUMMARY
